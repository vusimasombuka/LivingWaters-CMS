{% extends "base.html" %}

{% block title %}Initial Setup{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 450px; border-radius: 12px;">

        <div class="text-center mb-4">
            <h3 class="fw-bold">First-Time Setup</h3>
            <p class="text-muted mb-0">
                Create the Super Administrator account to activate the system.
            </p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input 
                    type="text" 
                    name="username" 
                    class="form-control" 
                    required 
                    autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input 
                    type="password" 
                    name="password" 
                    class="form-control" 
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <input 
                    type="password" 
                    name="confirm_password" 
                    class="form-control" 
                    required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Create Super Admin
            </button>
        </form>

    </div>
</div>
{% endblock %}
