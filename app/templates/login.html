<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Living Waters Bible Church – Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(
                rgba(0, 0, 0, 0.55),
                rgba(0, 0, 0, 0.55)
            ),
            url("/static/images/login-bg.jpg") no-repeat center center / cover;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Soft floating animation */
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        .login-box {
            width: 380px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            padding: 40px 35px;
            color: #fff;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            animation: float 6s ease-in-out infinite;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo img {
            width: 90px;
            margin-bottom: 10px;
        }

        .logo h2 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .logo p {
            margin-top: 6px;
            font-size: 13px;
            opacity: 0.85;
            font-style: italic;
        }

        form {
            margin-top: 30px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
            background: rgba(255,255,255,0.85);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .scripture {
            text-align: center;
            font-size: 12px;
            margin-top: 25px;
            opacity: 0.8;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>

<body>

    <div class="login-box">

        <div class="logo">
            <!-- Replace with your actual logo -->
            <img src="/static/images/logo.png" alt="Living Waters Bible Church">
            <h2>Living Waters</h2>
            <p>“Where life flows”</p>
        </div>

        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Enter the Sanctuary</button>
        </form>

        <div class="scripture">
            “Those who drink of the water I give will never thirst.”  
            <br>John 4:14
        </div>

    </div>

    <div class="footer">
        Living Waters Bible Church • CMS
    </div>

</body>
</html>
