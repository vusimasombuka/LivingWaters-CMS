{% extends "base.html" %}
{% block title %}Attendance Analytics{% endblock %}

{% block content %}

<h2>Attendance Analytics</h2>

<table class="table">
    <thead>
        <tr>
            <th>Service</th>
            <th>Total Check-ins</th>
        </tr>
    </thead>
    <tbody>
        {% for row in attendance %}
        <tr>
            <td>{{ row.service }}</td>
            <td>{{ row.total }}</td>
        </tr>
        {% else %}
        <tr>
            <td colspan="2">No attendance data available</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
