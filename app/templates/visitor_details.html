{% extends "base.html" %}
{% block title %}Visitor Details{% endblock %}

{% block content %}
<h2>Welcome – Please Complete Your Details</h2>

<form method="POST" action="{{ url_for('checkin.check_in') }}">

    <!-- Hidden fields carried from check-in -->
    <input type="hidden" name="phone" value="{{ phone }}">
    <input type="hidden" name="service_attended" value="{{ service }}">
    <input type="hidden" name="service_id" value="{{ service_id }}">

    <label>First Name</label>
    <input type="text" name="first_name" required>

    <label>Last Name</label>
    <input type="text" name="last_name" required>

    <button type="submit" class="btn btn-success">
        Complete Check-In
    </button>

</form>
{% endblock %}
