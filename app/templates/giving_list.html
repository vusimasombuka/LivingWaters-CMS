{% extends "base.html" %}
{% block content %}

<h2>All Giving Records</h2>

<table style="width:100%; border-collapse: collapse;">
    <thead>
        <tr style="background:#f0f0f0;">
            <th style="padding:10px; text-align:left;">Date</th>
            <th style="padding:10px; text-align:left;">Amount</th>
            <th style="padding:10px; text-align:left;">Category</th>
        </tr>
    </thead>
    <tbody>
        {% for g in giving_records %}
        <tr style="border-bottom:1px solid #eee;">
            <td style="padding:8px;">{{ g.created_at.strftime("%Y-%m-%d") }}</td>
            <td style="padding:8px;">R {{ "%.2f"|format(g.amount) }}</td>
            <td style="padding:8px;">{{ g.giving_type }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
