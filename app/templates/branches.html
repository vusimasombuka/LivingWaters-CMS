{% extends "base.html" %}
{% block title %}Branches{% endblock %}

{% block content %}

<h2>Branches</h2>

<a href="{{ url_for('auth.add_branch') }}">
    <button class="btn btn-success">Add Branch</button>
</a>

<br><br>

<table class="table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Location</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for branch in branches %}
        <tr>
            <td>{{ branch.id }}</td>
            <td>{{ branch.name }}</td>
            <td>{{ branch.location }}</td>
            <td>
    <a href="{{ url_for('auth.edit_branch', branch_id=branch.id) }}" class="btn btn-primary btn-sm">Edit</a>
    <a href="{{ url_for('auth.branch_qr_code', branch_id=branch.id) }}" class="btn btn-info btn-sm">QR Code</a>
    <form action="{{ url_for('auth.delete_branch', branch_id=branch.id) }}" method="POST" style="display:inline;">
        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')">Delete</button>
    </form>
</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
