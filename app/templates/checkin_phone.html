{% extends "base.html" %}
{% block title %}Check In{% endblock %}

{% block content %}
<h2>Church Check-In</h2>

<form method="POST">

    <label>Cellphone Number</label>
    <input name="phone" placeholder="0821234567 or +27821234567" optional>

    <label>Service Attended</label>
    <select name="service_id" required>
        <option value="">-- Select Service --</option>
        {% for s in services %}
            <option value="{{ s.id }}">
                {{ s.name }} - {{ s.day_of_week }} {{ s.time }}
            </option>
        {% endfor %}
    </select>

    <button type="submit">Check In</button>
    
</form>

{% endblock %}
