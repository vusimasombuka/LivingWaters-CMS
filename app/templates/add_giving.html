{% extends "base.html" %}
{% block title %}Add Giving{% endblock %}

{% block content %}
<h2>Add Giving</h2>

<form method="POST">

<label>Phone (optional)</label>
<input name="phone" placeholder="0821234567 or +27821234567">

<label>Amount</label>
<input name="amount" type="number" step="0.01" required>

<label>Giving Type</label>
<select name="giving_type" required>
    <option value="">Select Giving Type</option>
    {% for ot in offering_types %}
        <option value="{{ ot.value }}">{{ ot.value }}</option>
    {% endfor %}
</select>


<label>Payment Method</label>
<select name="payment_method">
    <option>Cash</option>
    <option>EFT</option>
    <option>Card</option>
</select>

<label>Notes</label>
<input name="notes">

<button type="submit" class="btn-primary">Save</button>
</form>
{% endblock %}
